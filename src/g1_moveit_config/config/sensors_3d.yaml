sensors:
  - default_sensor
default_sensor:
  sensor_plugin: occupancy_map_monitor/PointCloudOctomapUpdater
  point_cloud_topic: /camera/point_cloud
  max_range: 2.0
  point_subsample: 1
  padding_offset: 0.03 # Margen de seguridad extra de 3cm
  padding_scale: 1.0
  max_update_rate: 10.0
  filtered_cloud_topic: filtered_cloud
